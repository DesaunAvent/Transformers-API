<div class="character-page">

<h1>Submit Your Favorite Transformer</h1>

<p>
Complete the form below to update your favorite Transformer character.
</p>

<form id="update-form">
    <label for="name">Name</label>
    <input id="name" type="text" required>

    <label for="description">Description</label>
    <textarea id="description" required></textarea>

    <label for="faction">Faction</label>
    <input id="faction" type="text">

    <label for="universe">Universe</label>
    <input id="universe" type="text">

    <label for="role">Role</label>
    <input id="role" type="text">

    <label for="image">Image path</label>
    <input id="image" type="text" placeholder="/images/example.jpg">

    <button type="submit">Create Character</button>
</form>

<script src="/js/create.js"></script>
