<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2>Transformer Character Gallery</h2>

    <div>
       <a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="form.html">Character Form</a>
    </div>
</nav>

<div class="character-page">

<h1>Submit Your Favorite Transformer</h1>

<p>
Complete the form below to share your favorite Transformer character.
</p>

<form>

<label for="name">Character Name</label>

<input
type="text"
id="name"
placeholder="Optimus Prime">

<label for="team">Faction</label>

<select id="team">

<option>Autobot</option>

<option>Decepticon</option>

</select>

<label for="vehicle">Vehicle Mode</label>

<input
type="text"
id="vehicle"
placeholder="Semi Truck">

<label for="weapon">Primary Weapon</label>

<input
type="text"
id="weapon"
placeholder="Energon Axe">

<label for="rating">Power Rating (1-10)</label>

<input
type="number"
id="rating"
min="1"
max="10">

<label for="description">Why is this your favorite character?</label>

<textarea
id="description"
rows="6"
placeholder="Tell us why this Transformer is your favorite..."></textarea>

<button class="button" type="submit">
Submit
</button>

</form>

</div>

<footer>

<p>
© 2026 Transformer Character Gallery
</p>

<p>
Created by De'Saun Avent
</p>

</footer>

</body>
</html>
